<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Onboarding</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f6f9; padding: 15px; }
        .container { max-width: 600px; background: white; padding: 25px; border-radius: 12px; margin: 10px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: #1e3a8a; margin-bottom: 20px; border-bottom: 2px solid #e5e7eb; padding-bottom: 10px; }
        h3 { font-size: 14px; color: #4b5563; margin: 15px 0 10px 0; text-transform: uppercase; }
        .media-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .media-card { background: #f8fafc; border: 1px dashed #cbd5e1; border-radius: 8px; padding: 15px; text-align: center; cursor: pointer; font-size: 12px; font-weight: bold; position: relative; }
        .media-card input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .status-dot { color: #10b981; display: none; font-size: 11px; margin-top: 5px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #374151; }
        input, select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; }
        .btn-submit { background: #10b981; color: white; padding: 12px; width: 100%; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>New Customer Registration</h2>
        
        <h3>1. Upload or Capture KYC Documents</h3>
        <div class="media-grid">
            <div class="media-card">
                <span>📷 Aadhaar Card</span>
                <input type="file" accept="image/*" capture="environment" onchange="handleFile(this, 'Aadhar')">
                <div id="status-Aadhar" class="status-dot">✓ Loaded</div>
            </div>
            <div class="media-card">
                <span>📷 PAN Card</span>
                <input type="file" accept="image/*" capture="environment" onchange="handleFile(this, 'PAN')">
                <div id="status-PAN" class="status-dot">✓ Loaded</div>
            </div>
            <div class="media-card">
                <span>👤 Live Photo</span>
                <input type="file" accept="image/*" capture="user" onchange="handleFile(this, 'Photo')">
                <div id="status-Photo" class="status-dot">✓ Loaded</div>
            </div>
        </div>

        <h3>2. Applicant Demographics</h3>
        <form id="onboardForm" onsubmit="saveData(event)">
            <div class="form-row">
                <div class="form-group"><label>Full Name</label><input type="text" id="cName" required></div>
                <div class="form-group"><label>Mobile Number</label><input type="tel" id="cMobile" pattern="[0-9]{10}" required></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Email ID</label><input type="email" id="cEmail" required></div>
                <div class="form-group"><label>Date of Birth</label><input type="date" id="cDob" required onchange="checkAge()"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Aadhaar Number</label><input type="password" id="cAadhar" pattern="[0-9]{12}" required></div>
                <div class="form-group"><label>PAN Card Number</label><input type="text" id="cPan" pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}" required style="text-transform:uppercase;"></div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Marital Status</label>
                    <select id="mStatus" required onchange="adjustNominee()">
                        <option value="">Select</option>
                        <option value="Unmarried">Unmarried</option>
                        <option value="Married">Married</option>
                    </select>
                </div>
                <div class="form-group"><label id="nomLabel">Nominee Legal Guardian</label><input type="text" id="cNominee" required></div>
            </div>
            <button type="submit" class="btn-submit">Generate KYC Form Page</button>
        </form>
    </div>

    <script>
        const photoStorage = { Aadhar: '', PAN: '', Photo: '' };

        // Naya Compression Logic taaki Quota Error na aaye
        function handleFile(input, type) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        // Image ko chhota scale karne ke liye size set kiya
                        const MAX_WIDTH = 400;
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scaleSize;

                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        // 0.3 lagane se quality 30% ho jayegi aur size bahut kam ho jayega
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.3);
                        
                        photoStorage[type] = compressedBase64;
                        document.getElementById('status-' + type).style.display = 'block';
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function adjustNominee() {
            const status = document.getElementById('mStatus').value;
            document.getElementById('nomLabel').innerText = status === 'Unmarried' ? "Nominee Name (Father's Name)" : "Nominee Name (Husband/Wife Name)";
        }

        function checkAge() {
            const dobInp = document.getElementById('cDob').value;
            if(!dobInp) return false;
            const dob = new Date(dobInp);
            let age = (new Date()).getFullYear() - dob.getFullYear();
            if (age < 18) { alert("Error: Loan applicant must be 18+"); return false; }
            return true;
        }

        function saveData(e) {
            e.preventDefault();
            if(!checkAge()) return;

            // Log records ke liye chhota data structure (bina heavy images ke taaki status log chalta rahe)
            const logRecord = {
                name: document.getElementById('cName').value,
                mobile: document.getElementById('cMobile').value,
                nominee: document.getElementById('cNominee').value,
                date: new Date().toLocaleDateString()
            };

            // Print page ke liye bada data structure (jisme sirf temporary data rahega)
            const printPayload = {
                name: document.getElementById('cName').value,
                mobile: document.getElementById('cMobile').value,
                email: document.getElementById('cEmail').value,
                dob: document.getElementById('cDob').value,
                marital: document.getElementById('mStatus').value,
                nominee: document.getElementById('cNominee').value,
                imgPhoto: photoStorage.Photo,
                imgAadhar: photoStorage.Aadhar,
                imgPan: photoStorage.PAN,
                date: new Date().toLocaleDateString()
            };

            // Purani memory clean karke log save karne ke liye try-catch code block
            try {
                const currentLogs = JSON.parse(localStorage.getItem('onboardingRecords')) || [];
                currentLogs.push(logRecord); // Status log me sirf text jayega
                localStorage.setItem('onboardingRecords', JSON.stringify(currentLogs));
                
                // Print ke liye active payload set hoga
                localStorage.setItem('currentPrintPayload', JSON.stringify(printPayload));
                window.location.href = './print_kyc.html';
            } catch (error) {
                // Agar memory ab bhi full hai toh purana backlog clear karke fresh save karega
                localStorage.removeItem('onboardingRecords');
                const freshLogs = [logRecord];
                localStorage.setItem('onboardingRecords', JSON.stringify(freshLogs));
                localStorage.setItem('currentPrintPayload', JSON.stringify(printPayload));
                window.location.href = './print_kyc.html';
            }
        }
    </script>
</body>
</html>
